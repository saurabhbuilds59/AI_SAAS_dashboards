services:
  # Web Service running Django 5 + Gunicorn
  - type: web
    name: nexus-ai-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    numInstances: 1
    envVars:
      - key: DEBUG
        value: "False"
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-ai-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nexus-ai-dashboard.onrender.com"
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: nexus-ai-postgres
    plan: starter
    databaseName: nexus_ai_prod
    user: nexus_admin
    region: oregon