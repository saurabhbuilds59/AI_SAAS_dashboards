version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nexus_pg_db
    environment:
      POSTGRES_DB: nexus_ai_db
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_ai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: nexus_django_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-nexus-dev-key-change-in-prod-99x@
      - DATABASE_URL=postgres://nexus_user:nexus_secure_password@db:5432/nexus_ai_db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
      - CORS_ALLOW_ALL_ORIGINS=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data: